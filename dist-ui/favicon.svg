<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle top highlight -->
  <rect width="512" height="256" rx="96" fill="#fff" opacity="0.04"/>
  <!-- Border -->
  <rect x="1" y="1" width="510" height="510" rx="95" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- CHS text — bold, big, centered -->
  <g filter="url(#shadow)">
    <text x="256" y="345" text-anchor="middle"
      font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
      font-weight="900" font-size="260" letter-spacing="-14"
      fill="#ffffff">CHS</text>
  </g>
</svg>
