<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background: dark rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Accent bar: thin gradient stripe at top-left corner -->
  <rect x="60" y="60" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- CHS letters — modern, light weight -->
  <text x="256" y="336" text-anchor="middle"
    font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
    font-weight="700" font-size="220" letter-spacing="-6"
    fill="#F8FAFC">CHS</text>

  <!-- Subtle bottom-right dot accent -->
  <circle cx="432" cy="432" r="10" fill="url(#accent)"/>
</svg>
